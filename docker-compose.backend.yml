version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./server
    env_file:
      - ./server/.env.example
    ports:
      - '4000:4000'
    depends_on:
      - redis

volumes:
  redis-data:
